{% load static %}
<!DOCTYPE html>
<html lang="en" class="{{ html_theme_class }}" data-bs-theme="{{ bootstrap_theme }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Digital Library of AI Tools &amp; Tutorials{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" href="{% static 'catalog/css/saas.css' %}">
</head>
<body class="d-flex flex-column min-vh-100 pb-mobile">
  <div class="bg-mesh" aria-hidden="true"></div>
  {% block body %}{% endblock %}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  <script>
    (function () {
      var nav = document.getElementById("site-nav");
      if (!nav) return;
      function onScroll() {
        nav.classList.toggle("nav-compact", window.scrollY > 12);
      }
      window.addEventListener("scroll", onScroll, { passive: true });
      onScroll();
    })();
  </script>
  {% block extra_js %}{% endblock %}
</body>
</html>
